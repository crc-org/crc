version: "2"
run:
  timeout: 10m
  build-tags:
    - build
    - containers_image_openpgp
linters:
  enable:
    - gocritic
    - gosec
    - misspell
    - errcheck
    - gosec
    - revive
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
    rules:
      path: 'test/*'
      text: 'dot-imports: should not use dot imports'
      linters:
        - revive
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
