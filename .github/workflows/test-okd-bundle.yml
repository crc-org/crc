name: Test OKD bundle
on:
  push:
    branches: [main]
  pull_request: {}
jobs:
  build:
    name: Run OKD bundle with crc
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        go:
          - '1.25'
    env:
      SHELL: /bin/bash
      KUBECONFIG: '/Users/runner/.kube/config'
    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
      - name: Build
        run: |
          make cross
          sudo cp out/linux-amd64/crc /usr/local/bin/crc
      - name: Install required virtualization software
        run: |
          sudo apt-get update
          sudo apt install qemu-kvm libvirt-daemon libvirt-daemon-system virtiofsd
          sudo usermod -a -G libvirt $USER
      - name: Free disk space
        uses: palmsoftware/quick-cleanup@v0
        with:
          cleanup-mode: aggressive
      - name: Set the crc config
        run: |
          crc config set preset okd
          crc config set network-mode user
      - name: Setup the crc
        run: sudo -su $USER crc setup
      - name: Start the crc
        run: sudo -su $USER crc start
